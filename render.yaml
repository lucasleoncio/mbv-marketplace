# Render Blueprint — coloque este arquivo na RAIZ do repositório.
# (Se o repositório for a própria pasta "marketplace", já está no lugar certo.)
# No Render: New → Blueprint → conecte o repositório.
services:
  - type: web
    name: mbv-marketplace
    runtime: node
    plan: free                 # troque para "starter" se for usar disco persistente
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: JWT_SECRET
        generateValue: true    # o Render gera um segredo seguro automaticamente

      # --- Pagamento on-chain do NTR (ver BLOCKCHAIN.md) ---
      # Sem NTR_CONTRACT + STORE_WALLET o checkout em NTR fica simulado.
      # Testnet (Polygon Amoy):
      # - key: CHAIN_ID
      #   value: "80002"
      # - key: RPC_URL
      #   value: https://rpc-amoy.polygon.technology
      # - key: EXPLORER_URL
      #   value: https://amoy.polygonscan.com
      # - key: NTR_CONTRACT
      #   value: "0x..."          # endereço do token (TestNTR na testnet / NTR real na mainnet)
      # - key: STORE_WALLET
      #   value: "0x..."          # carteira da loja que recebe o NTR
      # - key: NTR_DECIMALS
      #   value: "18"
      # - key: MIN_CONFIRMATIONS
      #   value: "1"
      # - key: RATE_BRL_PER_NTR
      #   value: "9.36"

      # --- Mercado Pago (cartão + Pix via Checkout Pro) ---
      # - key: MP_ACCESS_TOKEN
      #   value: "TEST-..."     # token de TESTE para validar (depois troque pelo de produção)
      # --- E-mail (Resend) ---
      # - key: RESEND_API_KEY
      #   value: "re_..."
      # - key: EMAIL_FROM
      #   value: "MBV <no-reply@movimentobrasilverde.com>"
      # --- Google Analytics (opcional) ---
      # - key: GA_ID
      #   value: "G-XXXXXXXXXX"

    # ---------------------------------------------------------------
    # DADOS PERSISTENTES (opcional, requer plano pago)
    # Sem isto, o banco SQLite e as imagens enviadas zeram a cada deploy.
    # Para manter os dados: troque "plan: free" por "plan: starter",
    # descomente o bloco "disk" abaixo e as duas envVars a seguir.
    #   - key: MBV_DATA_DIR
    #     value: /var/data
    #   - key: MBV_UPLOAD_DIR
    #     value: /var/data/uploads
    # disk:
    #   name: mbv-data
    #   mountPath: /var/data
    #   sizeGB: 1
